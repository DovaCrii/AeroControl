{% extends "base.html" %}
{% load crispy_forms_tags i18n %}
{% block title %}{{ title }} - AeroControl{% endblock %}
{% block content %}<div class="card p-4"><h1 class="h3 mb-3">{{ title }}</h1><p class="text-muted">{% translate "The current version will be retained in version history." %}</p><form method="post" enctype="multipart/form-data">{% csrf_token %}{{ form|crispy }}<button class="btn btn-primary">{% translate "Replace document" %}</button><a href="{% url 'document-detail' document.pk %}" class="btn btn-outline-secondary ms-2">{% translate "Cancel" %}</a></form></div>{% endblock %}
