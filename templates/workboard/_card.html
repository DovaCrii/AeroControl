<div class="kanban-card priority-{{ task.priority }}" data-task-id="{{ task.id }}">
  <div class="kanban-card-title">{{ task.title }}</div>
  <div class="kanban-card-meta">
    <span class="kanban-priority priority-{{ task.priority }}">{{ task.get_priority_display }}</span>
    {% if task.assigned_to %}
      <span class="kanban-assignee">{{ task.assigned_to.full_name }}</span>
    {% endif %}
  </div>
  {% if task.due_date %}
    <div class="kanban-due">{{ task.due_date|date:"M j" }}</div>
  {% endif %}
</div>
