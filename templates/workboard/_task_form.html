{% load i18n %}
<form method="post" action="{% url 'task-edit' object.id %}" hx-post="{% url 'task-edit' object.id %}" hx-target="#task-detail-content">
  {% csrf_token %}
  {{ form.non_field_errors }}
  {% for field in form %}<div class="mb-3"><label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>{{ field }}{% if field.errors %}<div class="invalid-feedback d-block">{{ field.errors|striptags }}</div>{% endif %}</div>{% endfor %}
  <div class="d-flex gap-2"><button class="btn btn-primary" type="submit">{% translate "Save" %}</button><button type="button" class="btn btn-outline-secondary" data-bs-dismiss="offcanvas">{% translate "Cancel" %}</button></div>
</form>
