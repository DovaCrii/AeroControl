{% load i18n %}
<div class="kanban-column" data-stage-id="{{ stage.id }}">
  <div id="kanban-stage-{{ stage.id }}" class="kanban-column-header" style="border-top-color: {{ stage.color|default:'#2EC4B6' }};">
    <span>{{ stage.name }}</span>
    <span class="kanban-count" aria-label="{% translate 'Tasks in stage' %}: {{ tasks|length }}">{{ tasks|length }}</span>
  </div>
  <div class="kanban-column-body kanban-cards" data-stage-id="{{ stage.id }}" role="region" aria-labelledby="kanban-stage-{{ stage.id }}">
    {% for task in tasks %}
      {% include "workboard/_card.html" %}
    {% empty %}
      <div class="kanban-empty">{% translate "No tasks" %}</div>
    {% endfor %}
  </div>
  <div class="kanban-footer">
    <button class="btn btn-sm btn-outline-secondary w-100 kanban-add-btn"
            hx-get="{% url 'task-quick' %}?stage_id={{ stage.id }}{% if filter_params.board %}&amp;board={{ filter_params.board|urlencode }}{% endif %}{% if filter_params.operator %}&amp;operator={{ filter_params.operator|urlencode }}{% endif %}{% if filter_params.priority %}&amp;priority={{ filter_params.priority|urlencode }}{% endif %}"
            hx-target="closest .kanban-column .kanban-footer"
            hx-swap="innerHTML">+ {% translate "Add" %}</button>
  </div>
</div>
