{% for object in objects %}
<tr>
  <td><a href="{{ object.pk }}/">{{ object }}</a></td>
  <td>{{ object.created_at|date:'Y-m-d' }}</td>
  <td>{% if object.is_active %}<span class="badge bg-success">Active</span>{% else %}<span class="badge bg-secondary">Archived</span>{% endif %}</td>
  <td class="text-end">
    <a href="{{ object.pk }}/" class="btn btn-sm btn-outline-secondary">View</a>
    <a href="{{ object.pk }}/edit/" class="btn btn-sm btn-outline-primary">Edit</a>
  </td>
</tr>
{% empty %}
<tr><td colspan="99" class="text-center text-muted py-4">No records found.</td></tr>
{% endfor %}
