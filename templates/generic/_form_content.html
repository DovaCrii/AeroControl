{% load crispy_forms_tags i18n %}
<form class="form-shell" method="post" action="{{ request.path }}" {% if form.is_multipart %}enctype="multipart/form-data"{% endif %}
      hx-post="{{ request.path }}" hx-target="#modal-content" hx-swap="innerHTML">
  {% csrf_token %}
  {{ form|crispy }}
  <div class="form-actions d-flex gap-2 mt-4">
    <button type="submit" class="btn btn-primary">{% translate "Save" %}</button>
    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">{% translate "Cancel" %}</button>
  </div>
</form>
