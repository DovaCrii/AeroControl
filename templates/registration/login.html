{% load static %}<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In — AeroOps Desk</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
  <style>
    .login-page {
      background: linear-gradient(135deg, #1B2A4A 0%, #24355e 50%, #2a4170 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .login-logo svg {
      width: 56px;
      height: 56px;
    }
    .login-title {
      font-weight: 700;
      font-size: 1.35rem;
      color: #1B2A4A;
      text-align: center;
      margin-bottom: 0.25rem;
    }
    .login-subtitle {
      color: #6c757d;
      font-size: 0.9rem;
      text-align: center;
      margin-bottom: 1.75rem;
    }
    .login-card .form-label {
      font-weight: 500;
      font-size: 0.85rem;
      color: #495057;
    }
    .login-card .form-control {
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      border: 1px solid #dee2e6;
      font-size: 0.95rem;
    }
    .login-card .form-control:focus {
      border-color: #2EC4B6;
      box-shadow: 0 0 0 0.2rem rgba(46, 196, 182, 0.2);
    }
    .login-card .btn-primary {
      background: #1B2A4A;
      border: none;
      border-radius: 8px;
      padding: 0.65rem;
      font-weight: 600;
      font-size: 0.95rem;
      transition: background 0.15s ease;
    }
    .login-card .btn-primary:hover {
      background: #24355e;
    }
    .login-alert {
      border-radius: 8px;
      font-size: 0.85rem;
      padding: 0.5rem 0.75rem;
    }
    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #adb5bd;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="46" stroke="#1B2A4A" stroke-width="3"/>
          <path d="M28 62 L50 28 L72 62" stroke="#2EC4B6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="50" cy="62" r="4" fill="#2EC4B6"/>
          <path d="M50 34 V54" stroke="#2EC4B6" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M42 46 L50 54 L58 46" stroke="#2EC4B6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="login-title">AeroOps Desk</div>
      <div class="login-subtitle">Sign in to your operations dashboard</div>

      <form method="post">
        {% csrf_token %}
        {% if form.errors %}
          <div class="alert alert-danger login-alert">
            ✕ Invalid username or password. Try again.
          </div>
        {% endif %}
        <div class="mb-3">
          <label for="id_username" class="form-label">{{ form.username.label }}</label>
          {{ form.username }}
        </div>
        <div class="mb-3">
          <label for="id_password" class="form-label">{{ form.password.label }}</label>
          {{ form.password }}
        </div>
        <button type="submit" class="btn btn-primary w-100">Sign In</button>
      </form>

      <div class="login-footer">AeroOps Desk &mdash; Operations Management Platform</div>
    </div>
  </div>
</body>
</html>
