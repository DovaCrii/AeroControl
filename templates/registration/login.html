{% extends "base.html" %}
{% load static %}
{% block title %}Sign In - AeroOps Desk{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4 mt-5 shadow-sm">
      <div class="text-center mb-4">
        <h2 class="h4">AeroOps Desk</h2>
        <p class="text-muted small">Sign in to your account</p>
      </div>
      <form method="post">
        {% csrf_token %}
        {% if form.errors %}
          <div class="alert alert-danger py-2 small">Invalid username or password.</div>
        {% endif %}
        <div class="mb-3">
          <label class="form-label">{{ form.username.label }}</label>
          {{ form.username }}
        </div>
        <div class="mb-3">
          <label class="form-label">{{ form.password.label }}</label>
          {{ form.password }}
        </div>
        <button type="submit" class="btn btn-primary w-100">Sign In</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
